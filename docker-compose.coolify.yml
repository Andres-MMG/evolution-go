services:
  evolution-go:
    image: evoapicloud/evolution-go:latest
    restart: unless-stopped
    environment:
      # Coolify auto-generates FQDN and exposes port 4000
      SERVICE_FQDN_EVOLUTIONGO_4000: ""

      # Server
      SERVER_PORT: "4000"
      CLIENT_NAME: "barberias"

      # Security — auto-generated by Coolify
      GLOBAL_API_KEY: "${SERVICE_PASSWORD_GLOBALAPIKEY}"

      # PostgreSQL — uses the postgres service below
      POSTGRES_AUTH_DB: "postgresql://${SERVICE_USER_POSTGRES}:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/evogo_auth?sslmode=disable"
      POSTGRES_USERS_DB: "postgresql://${SERVICE_USER_POSTGRES}:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/evogo_users?sslmode=disable"
      DATABASE_SAVE_MESSAGES: "false"

      # Logs
      WADEBUG: "INFO"
      LOGTYPE: "console"
      LOG_DIRECTORY: "/app/logs"
      LOG_MAX_SIZE: "100"
      LOG_MAX_BACKUPS: "5"
      LOG_MAX_AGE: "30"
      LOG_COMPRESS: "true"

      # Connection
      CONNECT_ON_STARTUP: "false"
      WEBHOOKFILES: "true"

      # System
      OS_NAME: "Linux"

      # Events (optional — fill later if needed)
      WEBHOOK_URL: ""
      AMQP_URL: ""
      AMQP_GLOBAL_ENABLED: "false"
      NATS_URL: ""
      NATS_GLOBAL_ENABLED: "false"

      # Media storage (disabled)
      MINIO_ENABLED: "false"

      # Proxy (disabled)
      PROXY_HOST: ""
      PROXY_PORT: ""
      PROXY_USERNAME: ""
      PROXY_PASSWORD: ""

      # Events filter
      EVENT_IGNORE_GROUP: "false"
      EVENT_IGNORE_STATUS: "true"

      # QR Code
      QRCODE_MAX_COUNT: "5"

    volumes:
      - evolution_data:/app/dbdata
      - evolution_logs:/app/logs
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${SERVICE_USER_POSTGRES}"
      POSTGRES_PASSWORD: "${SERVICE_PASSWORD_POSTGRES}"
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/examples/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d postgres -h 127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  evolution_data:
    driver: local
  evolution_logs:
    driver: local
  postgres_data:
    driver: local
